services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # ── Core enrichment service ──────────────────────────────────────────────
    Nikos\NrEnrichCore\Service\AiEnrichmentService:
        arguments:
            $providers: !tagged_iterator nr_enrich_core.provider
            $defaultProvider: '%nr_enrich_core.default_provider%'
            $logger: '@logger'
        public: true

    # ── REST controller ──────────────────────────────────────────────────────
    Nikos\NrEnrichCore\Controller\EnrichmentApiController:
        tags: ['controller.service_arguments']
        public: true

    # ── Console command ──────────────────────────────────────────────────────
    Nikos\NrEnrichCore\Command\EnrichObjectCommand:
        tags:
            - { name: console.command, command: 'nrec:enrich' }

    # ── Async message handler ────────────────────────────────────────────────
    # Explicit tagging keeps async enrichment wired even without #[AsMessageHandler].
    Nikos\NrEnrichCore\MessageHandler\EnrichObjectMessageHandler:
        tags: ['messenger.message_handler']
        arguments:
            $classFieldConfigs: []
            $logger: '@logger'
