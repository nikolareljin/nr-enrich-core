name: CI

on:
  push:
    branches: [main]

jobs:
  bundle-check:
    name: Pimcore bundle check
    uses: nikolareljin/ci-helpers/.github/workflows/pimcore.yml@production
    with:
      compose_file: docker-test/docker-compose.yml
      bundle_src: "."
      bundle_src_env: BUNDLE_SRC
      php_service: php
      db_service: db
      db_wait_seconds: "30"
      out_dir: docker-test/tmp
      composer_command: "composer config audit.block-insecure false && composer install --no-interaction --prefer-dist"
      phpcs_command: "vendor/bin/phpcs --standard=PSR12 --extensions=php src/"
      phpunit_command: "vendor/bin/phpunit --testdox"
      phpunit_coverage_command: "XDEBUG_MODE=coverage vendor/bin/phpunit"
      fail_on_findings: true
      upload_artifact: true
      artifact_name: nr-enrich-core-ci-results
